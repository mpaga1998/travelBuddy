name: CI

on:
  pull_request:
  push:
    branches:
      - dev-itinerary-refactor

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        # Shell guard so the step is skipped rather than failing when the
        # 'lint' script isn't present (e.g. in a fresh fork).
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No 'lint' script in package.json — skipping."
          fi
